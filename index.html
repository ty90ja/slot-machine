<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="スロット">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="manifest.json">
  <title>🎰 LUCKY SPIN</title>
  <style>
    :root{--gold:#ffd700;--red:#ff2244;--bg:#0a0a0f;--panel:#12121e;--reel-bg:#070710;}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{background:var(--bg);color:#fff;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(255,34,68,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(255,170,0,.08) 0%,transparent 50%);pointer-events:none;}
    .stars{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
    .star{position:absolute;width:2px;height:2px;background:rgba(255,255,255,.6);border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);}
    @keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
    .coin-layer{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
    .coin{position:absolute;font-size:22px;bottom:-40px;animation:coinFly var(--dur) cubic-bezier(0.2,0.8,0.4,1) forwards;filter:drop-shadow(0 0 6px rgba(255,215,0,0.8));}
    @keyframes coinFly{0%{transform:translateY(0) rotate(0deg) scale(0.8);opacity:1}60%{opacity:1}100%{transform:translateY(var(--fly-y)) rotate(var(--rot)) scale(1.1);opacity:0}}
    .confetti-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:100;}
    .confetti-piece{position:absolute;width:8px;height:8px;top:-10px;border-radius:1px;animation:confettiFall var(--dur) ease-in forwards;}
    @keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    .machine{width:min(400px,95vw);position:relative;z-index:10;}
    .title{text-align:center;margin-bottom:12px;}
    .title h1{font-family:Impact,'Arial Black',sans-serif;font-size:clamp(32px,9vw,48px);letter-spacing:6px;background:linear-gradient(135deg,#ffd700,#ff8800,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 12px rgba(255,170,0,.6));}
    .credits-bar{display:flex;justify-content:space-between;align-items:center;background:var(--panel);border:1px solid rgba(255,215,0,.2);border-radius:12px;padding:8px 14px;margin-bottom:12px;}
    .credit-box{text-align:center;}
    .credit-label{font-size:9px;color:rgba(255,215,0,.6);letter-spacing:2px;text-transform:uppercase;}
    .credit-value{font-family:Impact,'Arial Black',sans-serif;font-size:26px;color:var(--gold);letter-spacing:2px;filter:drop-shadow(0 0 8px rgba(255,215,0,.5));}
    .credit-value.win-flash{animation:flashWin .3s ease-in-out 4;}
    @keyframes flashWin{0%,100%{color:var(--gold)}50%{color:#fff;filter:drop-shadow(0 0 16px rgba(255,215,0,1))}}
    .bet-controls{display:flex;align-items:center;gap:6px;}
    .bet-btn{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);color:var(--gold);width:26px;height:26px;border-radius:6px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;transition:all .12s;}
    .bet-btn:active{background:rgba(255,215,0,.3);transform:scale(.9);}
    .machine-body{background:var(--panel);border:2px solid rgba(255,215,0,.25);border-radius:20px;padding:16px;box-shadow:0 0 40px rgba(255,170,0,.1);position:relative;overflow:hidden;}
    .machine-body::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.5),transparent);}
    .payline{position:absolute;left:0;right:0;top:calc(50% - 28px);height:2px;background:linear-gradient(90deg,transparent,rgba(255,34,68,.8),rgba(255,34,68,.8),transparent);pointer-events:none;z-index:20;opacity:.6;}
    .reels{display:flex;gap:8px;justify-content:center;}
    .reel-unit{display:flex;flex-direction:column;align-items:center;flex:1;gap:8px;}
    .reel-wrap{width:100%;position:relative;border-radius:12px;overflow:hidden;background:var(--reel-bg);border:1px solid rgba(255,215,0,.15);height:110px;box-shadow:inset 0 4px 20px rgba(0,0,0,.5);transition:border-color .3s,box-shadow .3s;}
    .reel-wrap::before,.reel-wrap::after{content:'';position:absolute;left:0;right:0;height:30px;z-index:10;pointer-events:none;}
    .reel-wrap::before{top:0;background:linear-gradient(to bottom,var(--reel-bg),transparent);}
    .reel-wrap::after{bottom:0;background:linear-gradient(to top,var(--reel-bg),transparent);}
    .reel-wrap.winner{border-color:var(--gold);box-shadow:0 0 24px rgba(255,215,0,.6);animation:winnerPulse .5s ease-in-out infinite alternate;}
    .reel-wrap.stopped{border-color:rgba(255,255,255,.3);}
    @keyframes winnerPulse{from{box-shadow:0 0 10px rgba(255,215,0,.3)}to{box-shadow:0 0 30px rgba(255,215,0,.9)}}
    .reel{position:absolute;width:100%;display:flex;flex-direction:column;align-items:center;will-change:transform;}
    .symbol{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:52px;flex-shrink:0;line-height:1;}
    .stop-btn{width:100%;height:40px;border-radius:10px;border:2px solid rgba(255,255,255,.25);background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);font-family:Impact,'Arial Black',sans-serif;font-size:13px;letter-spacing:2px;cursor:pointer;transition:all .12s;-webkit-user-select:none;position:relative;overflow:hidden;}
    .stop-btn:active:not(:disabled){transform:translateY(3px);}
    .stop-btn:disabled{opacity:.3;cursor:not-allowed;}
    .stop-btn.active{border-color:rgba(255,80,80,.8);background:rgba(255,30,30,.2);color:#ff8080;box-shadow:0 0 14px rgba(255,40,40,.4);animation:stopPulse .8s ease-in-out infinite alternate;}
    @keyframes stopPulse{from{box-shadow:0 0 6px rgba(255,40,40,.3)}to{box-shadow:0 0 18px rgba(255,40,40,.7)}}
    .stop-btn.done{border-color:rgba(100,255,100,.5);background:rgba(0,200,0,.1);color:rgba(100,255,100,.8);}
    .result-msg{text-align:center;min-height:44px;display:flex;align-items:center;justify-content:center;margin-top:12px;}
    .msg-text{font-family:Impact,'Arial Black',sans-serif;font-size:30px;letter-spacing:3px;opacity:0;transform:translateY(10px) scale(.9);transition:all .3s cubic-bezier(.34,1.56,.64,1);}
    .msg-text.show{opacity:1;transform:translateY(0) scale(1);}
    .msg-text.jackpot{color:var(--gold);filter:drop-shadow(0 0 16px rgba(255,215,0,.8));}
    .msg-text.big{color:#ff8800;}
    .msg-text.win{color:#88ff44;}
    .msg-text.small{color:#44aaff;}
    .msg-text.lose{color:rgba(255,255,255,.3);font-size:16px;}
    .spin-area{margin-top:14px;display:flex;flex-direction:column;align-items:center;gap:10px;}
    .spin-btn{width:100%;height:60px;border-radius:14px;border:none;cursor:pointer;font-family:Impact,'Arial Black',sans-serif;font-size:24px;letter-spacing:4px;position:relative;overflow:hidden;background:linear-gradient(135deg,#ff2244,#cc0022);color:white;box-shadow:0 6px 0 #880011;transition:all .12s;-webkit-user-select:none;}
    .spin-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 2s linear infinite;}
    @keyframes shimmer{100%{left:100%}}
    .spin-btn:active:not(:disabled){transform:translateY(4px);box-shadow:0 2px 0 #880011;}
    .spin-btn:disabled{opacity:.5;cursor:not-allowed;}
    .spin-btn.spinning{background:linear-gradient(135deg,#333,#111);box-shadow:0 6px 0 #000;}
    .spin-btn.spinning::before{display:none;}
    .paytable{background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.1);border-radius:12px;padding:10px 12px;width:100%;}
    .paytable-title{font-size:9px;color:rgba(255,215,0,.5);letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:6px;}
    .paytable-rows{display:grid;grid-template-columns:repeat(2,1fr);gap:3px 10px;}
    .pt-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;}
    .pt-symbols{font-size:14px;line-height:1.5;}
    .pt-mult{color:var(--gold);font-weight:700;font-size:10px;}

    /* キャラクター演出 */
    .char-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .char-overlay.show {
      pointer-events: auto;
      opacity: 1;
    }
    .char-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
    }
    .char-img-wrap {
      position: relative;
      z-index: 1;
      transform: scale(0.3) translateY(60px);
      opacity: 0;
      transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      cursor: pointer;
    }
    .char-overlay.show .char-img-wrap {
      transform: scale(1) translateY(0);
      opacity: 1;
    }
    .char-img {
      height: min(80dvh, 420px);
      width: auto;
      filter: drop-shadow(0 0 30px rgba(255,215,0,0.6)) drop-shadow(0 0 60px rgba(255,170,0,0.3));
    }
    .char-tap-hint {
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      white-space: nowrap;
      animation: hintBlink 1.2s ease-in-out infinite;
    }
    @keyframes hintBlink { 0%,100%{opacity:0.3} 50%{opacity:1} }
  </style>
</head>

<script>
const SYMBOLS=['💎','7️⃣','🍒','⭐','🍋','🍇','🍊','🔔'];
const WEIGHTS=[1,3,12,8,12,10,10,8];
const PAYTABLE={'💎💎💎':100,'7️⃣7️⃣7️⃣':50,'🍒🍒🍒':20,'⭐⭐⭐':15,'🍋🍋🍋':10,'🍇🍇🍇':8,'🍊🍊🍊':6,'🔔🔔🔔':5};
let credits=parseInt(localStorage.getItem('slotCredits')||'1000');
const BET_OPTIONS=[5,10,25,50,100];
let betIndex=BET_OPTIONS.indexOf(parseInt(localStorage.getItem('slotBet')||'10'));
if(betIndex<0)betIndex=1;
let gameState='idle';
const ITEM_H=110;
const reelState=[
  {spinning:false,stopped:false,targetSymbol:null,animFrame:null,pos:0,speed:0,decelerating:false,decelCount:0},
  {spinning:false,stopped:false,targetSymbol:null,animFrame:null,pos:0,speed:0,decelerating:false,decelCount:0},
  {spinning:false,stopped:false,targetSymbol:null,animFrame:null,pos:0,speed:0,decelerating:false,decelCount:0}
];
const SPIN_SPEED=16;
const DECEL_FRAMES=25;

// 星
const starsEl=document.getElementById('stars');
for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.setProperty('--d',(2+Math.random()*4)+'s');s.style.setProperty('--delay',(Math.random()*3)+'s');starsEl.appendChild(s);}

function pickSymbol(){const t=WEIGHTS.reduce((a,b)=>a+b,0);let r=Math.random()*t;for(let i=0;i<SYMBOLS.length;i++){r-=WEIGHTS[i];if(r<=0)return SYMBOLS[i];}return SYMBOLS[SYMBOLS.length-1];}

// 初期表示
function initReel(idx){
  const el=document.getElementById('reelInner'+idx);
  el.innerHTML='';
  for(let i=0;i<3;i++){const d=document.createElement('div');d.className='symbol';d.textContent=pickSymbol();el.appendChild(d);}
  el.style.transition='none';
  el.style.transform='translateY(-'+ITEM_H+'px)';
}
[0,1,2].forEach(i=>initReel(i));

function updateUI(){
  document.getElementById('credits').textContent=credits;
  document.getElementById('betDisplay').textContent=BET_OPTIONS[betIndex];
  localStorage.setItem('slotCredits',credits);
  localStorage.setItem('slotBet',BET_OPTIONS[betIndex]);
}
updateUI();

document.getElementById('betDown').addEventListener('click',()=>{if(gameState!=='idle')return;betIndex=Math.max(0,betIndex-1);updateUI();});
document.getElementById('betUp').addEventListener('click',()=>{if(gameState!=='idle')return;betIndex=Math.min(BET_OPTIONS.length-1,betIndex+1);updateUI();});


// キャラクター表示
function showCharacter() {
  const overlay = document.getElementById('charOverlay');
  overlay.classList.add('show');
}
function hideCharacter() {
  const overlay = document.getElementById('charOverlay');
  overlay.classList.remove('show');
}
document.getElementById('charOverlay').addEventListener('click', hideCharacter);

function showMsg(text,type){const el=document.getElementById('msgText');el.className='msg-text';el.textContent=text;el.offsetHeight;el.classList.add('show',type);}
function hideMsg(){document.getElementById('msgText').className='msg-text';}

// リールスピン
function startReelSpin(idx){
  const state=reelState[idx];
  const el=document.getElementById('reelInner'+idx);
  const syms=[];
  for(let i=0;i<60;i++)syms.push(pickSymbol());
  el.innerHTML='';
  syms.forEach(s=>{const d=document.createElement('div');d.className='symbol';d.textContent=s;el.appendChild(d);});
  state.pos=0;
  state.speed=SPIN_SPEED;
  state.spinning=true;
  state.stopped=false;
  state.decelerating=false;
  state.decelCount=0;
  el.style.transition='none';
  el.style.transform='translateY(0)';

  function animate(){
    if(!state.spinning)return;
    if(state.decelerating){
      state.decelCount++;
      const ease=1-Math.pow(state.decelCount/DECEL_FRAMES,2);
      state.speed=SPIN_SPEED*ease;
      state.pos+=Math.max(state.speed,0);
      if(state.decelCount>=DECEL_FRAMES){snapToTarget(idx);return;}
    }else{
      state.pos+=state.speed;
    }
    // ループ
    const totalH=syms.length*ITEM_H;
    if(state.pos>=totalH-ITEM_H*3)state.pos-=totalH/2;
    el.style.transform='translateY(-'+state.pos+'px)';
    state.animFrame=requestAnimationFrame(animate);
  }
  state.animFrame=requestAnimationFrame(animate);
}

function snapToTarget(idx){
  const state=reelState[idx];
  const el=document.getElementById('reelInner'+idx);
  cancelAnimationFrame(state.animFrame);
  el.innerHTML='';
  const snap=[pickSymbol(),state.targetSymbol,pickSymbol()];
  snap.forEach(s=>{const d=document.createElement('div');d.className='symbol';d.textContent=s;el.appendChild(d);});
  el.style.transition='transform 0.12s ease-out';
  el.style.transform='translateY(-'+ITEM_H+'px)';
  state.spinning=false;
  state.stopped=true;
  const btn=document.getElementById('stopBtn'+idx);
  btn.disabled=true;
  btn.classList.remove('active');
  btn.classList.add('done');
  btn.textContent='✓';
  document.getElementById('reel'+idx).classList.add('stopped');
  checkAllStopped();
}

function stopReel(idx){
  const state=reelState[idx];
  if(!state.spinning||state.decelerating)return;
  state.decelerating=true;
  state.decelCount=0;
  const btn=document.getElementById('stopBtn'+idx);
  btn.disabled=true;
  btn.classList.remove('active');
}

function checkAllStopped(){
  if(!reelState.every(s=>s.stopped))return;
  setTimeout(judgeResult,250);
}

function judgeResult(){
  const results=reelState.map(s=>s.targetSymbol);
  const key=results.join('');
  let mult=0;
  if(PAYTABLE[key])mult=PAYTABLE[key];
  else if(results[0]==='🍒'&&results[1]==='🍒')mult=3;
  else if(results[0]==='🍒')mult=1.5;
  const bet=BET_OPTIONS[betIndex];
  if(mult>0){
    const win=Math.floor(bet*mult);
    credits+=win;
    document.getElementById('lastWin').textContent=win;
    document.getElementById('lastWin').classList.add('win-flash');
    setTimeout(()=>document.getElementById('lastWin').classList.remove('win-flash'),1200);
    updateUI();
    let mt='',my='small';
    if(mult>=50){mt='🎊 JACKPOT!! 🎊';my='jackpot';launchCoinShower(120);launchConfetti(80);[0,1,2].forEach(i=>document.getElementById('reel'+i).classList.add('winner'));}
    else if(mult>=20){mt='🔥 BIG WIN! ×'+mult;my='big';launchCoinShower(60);launchConfetti(40);[0,1,2].forEach(i=>document.getElementById('reel'+i).classList.add('winner'));}
    else if(mult>=8){mt='✨ WIN! ×'+mult;my='win';launchCoinShower(25);[0,1,2].forEach(i=>document.getElementById('reel'+i).classList.add('winner'));}
    else if(mult>=3){mt='＋'+win+'コイン';my='small';launchCoinShower(10);}
    else{mt='＋'+win+'コイン';my='small';launchCoinShower(4);}
    showMsg(mt,my);
    setTimeout(showCharacter, 300);
    setTimeout(()=>[0,1,2].forEach(i=>{document.getElementById('reel'+i).classList.remove('winner','stopped');}),3000);
  }else{
    showMsg('MISS...','lose');
    setTimeout(()=>[0,1,2].forEach(i=>document.getElementById('reel'+i).classList.remove('stopped')),800);
  }
  if(credits<=0)setTimeout(()=>{credits=1000;updateUI();showMsg('🎁 RELOAD! 1000コイン','small');},1800);
  gameState='idle';
  const spinBtn=document.getElementById('spinBtn');
  spinBtn.disabled=false;
  spinBtn.classList.remove('spinning');
  spinBtn.textContent='SPIN';
}

// コインシャワー
function launchCoinShower(count){
  const layer=document.getElementById('coinLayer');
  const total=Math.min(count,150);
  for(let i=0;i<total;i++){
    setTimeout(()=>{
      const c=document.createElement('div');
      c.className='coin';
      c.textContent='🪙';
      c.style.left=(5+Math.random()*90)+'vw';
      c.style.setProperty('--fly-y',(-(150+Math.random()*500))+'px');
      c.style.setProperty('--rot',(-180+Math.random()*360)+'deg');
      c.style.setProperty('--dur',(0.7+Math.random()*0.9)+'s');
      layer.appendChild(c);
      setTimeout(()=>c.remove(),2000);
    },i*(1200/total));
  }
}

// コンフェッティ
function launchConfetti(n){
  const wrap=document.getElementById('confetti');
  wrap.innerHTML='';
  const colors=['#ffd700','#ff2244','#44aaff','#88ff44','#ff8800','#fff'];
  for(let i=0;i<n;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'vw';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.setProperty('--dur',(1.5+Math.random()*1.5)+'s');p.style.animationDelay=Math.random()*0.5+'s';p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';wrap.appendChild(p);}
  setTimeout(()=>wrap.innerHTML='',3500);
}

// SPINボタン
document.getElementById('spinBtn').addEventListener('click',()=>{
  if(gameState!=='idle')return;
  const bet=BET_OPTIONS[betIndex];
  if(credits<bet){showMsg('コインが足りない！','lose');return;}
  credits-=bet;
  document.getElementById('lastWin').textContent=0;
  updateUI();
  hideMsg();
  gameState='spinning';
  reelState[0].targetSymbol=pickSymbol();
  reelState[1].targetSymbol=pickSymbol();
  reelState[2].targetSymbol=pickSymbol();
  [0,1,2].forEach(i=>document.getElementById('reel'+i).classList.remove('winner','stopped'));
  const spinBtn=document.getElementById('spinBtn');
  spinBtn.disabled=true;
  spinBtn.classList.add('spinning');
  spinBtn.textContent='回転中...';
  [0,1,2].forEach(idx=>{
    setTimeout(()=>{
      startReelSpin(idx);
      const btn=document.getElementById('stopBtn'+idx);
      btn.disabled=false;
      btn.classList.add('active');
      btn.classList.remove('done');
      btn.textContent='STOP';
    },idx*120);
  });
});

// STOPボタン
[0,1,2].forEach(idx=>{
  document.getElementById('stopBtn'+idx).addEventListener('click',()=>{
    if(gameState!=='spinning')return;
    stopReel(idx);
  });
});

document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();document.getElementById('spinBtn').click();}});
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
