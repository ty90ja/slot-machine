<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="スロット">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="manifest.json">
  <title>🎰 LUCKY SPIN</title>
  <style>
    @import url('data:text/css,');
  </style>
  <style>
    :root {
      --gold: #ffd700;
      --gold2: #ffaa00;
      --red: #ff2244;
      --bg: #0a0a0f;
      --panel: #12121e;
      --reel-bg: #070710;
      --glow: rgba(255, 215, 0, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 背景エフェクト */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(255,34,68,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(255,170,0,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* メインコンテナ */
    .machine {
      width: min(400px, 95vw);
      position: relative;
      z-index: 10;
    }

    /* タイトル */
    .title {
      text-align: center;
      margin-bottom: 16px;
    }

    .title h1 {
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: clamp(36px, 10vw, 52px);
      letter-spacing: 6px;
      background: linear-gradient(135deg, #ffd700, #ff8800, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 12px rgba(255,170,0,0.6));
    }

    /* コインカウンター */
    .credits-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--panel);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 16px;
    }

    .credit-box {
      text-align: center;
    }

    .credit-label {
      font-size: 10px;
      color: rgba(255,215,0,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .credit-value {
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: 28px;
      color: var(--gold);
      letter-spacing: 2px;
      filter: drop-shadow(0 0 8px rgba(255,215,0,0.5));
    }

    .credit-value.win-flash {
      animation: flashWin 0.3s ease-in-out 3;
    }

    @keyframes flashWin {
      0%, 100% { color: var(--gold); }
      50% { color: #fff; filter: drop-shadow(0 0 16px rgba(255,215,0,1)); }
    }

    /* ベット変更 */
    .bet-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bet-btn {
      background: rgba(255,215,0,0.1);
      border: 1px solid rgba(255,215,0,0.3);
      color: var(--gold);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      -webkit-user-select: none;
    }

    .bet-btn:active {
      background: rgba(255,215,0,0.3);
      transform: scale(0.92);
    }

    /* リール本体 */
    .machine-body {
      background: var(--panel);
      border: 2px solid rgba(255,215,0,0.25);
      border-radius: 20px;
      padding: 20px;
      box-shadow:
        0 0 40px rgba(255,170,0,0.1),
        inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }

    .machine-body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.5), transparent);
    }

    /* ペイライン */
    .payline {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,34,68,0.8), rgba(255,34,68,0.8), transparent);
      pointer-events: none;
      z-index: 20;
      opacity: 0.6;
    }

    .payline::before, .payline::after {
      content: '◆';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--red);
      font-size: 10px;
    }

    .payline::before { left: 8px; }
    .payline::after { right: 8px; }

    /* リールコンテナ */
    .reels {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .reel-wrap {
      flex: 1;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: var(--reel-bg);
      border: 1px solid rgba(255,215,0,0.15);
      height: 110px;
      box-shadow: inset 0 4px 20px rgba(0,0,0,0.5);
    }

    .reel-wrap::before,
    .reel-wrap::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 30px;
      z-index: 10;
      pointer-events: none;
    }

    .reel-wrap::before {
      top: 0;
      background: linear-gradient(to bottom, var(--reel-bg), transparent);
    }

    .reel-wrap::after {
      bottom: 0;
      background: linear-gradient(to top, var(--reel-bg), transparent);
    }

    .reel {
      position: absolute;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform;
    }

    .symbol {
      width: 100%;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      flex-shrink: 0;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    /* 当選演出 */
    .reel-wrap.winner {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(255,215,0,0.5), inset 0 4px 20px rgba(0,0,0,0.5);
      animation: winnerPulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes winnerPulse {
      from { box-shadow: 0 0 10px rgba(255,215,0,0.3), inset 0 4px 20px rgba(0,0,0,0.5); }
      to   { box-shadow: 0 0 30px rgba(255,215,0,0.8), inset 0 4px 20px rgba(0,0,0,0.5); }
    }

    /* 結果メッセージ */
    .result-msg {
      text-align: center;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 14px;
    }

    .msg-text {
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: 32px;
      letter-spacing: 3px;
      opacity: 0;
      transform: translateY(10px) scale(0.9);
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    .msg-text.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .msg-text.jackpot { color: var(--gold); filter: drop-shadow(0 0 16px rgba(255,215,0,0.8)); }
    .msg-text.big { color: #ff8800; filter: drop-shadow(0 0 10px rgba(255,136,0,0.6)); }
    .msg-text.win { color: #88ff44; }
    .msg-text.small { color: #44aaff; }
    .msg-text.lose { color: rgba(255,255,255,0.3); font-size: 18px; }

    /* スピンボタン */
    .spin-area {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .spin-btn {
      width: 100%;
      height: 64px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: 26px;
      letter-spacing: 4px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #ff2244, #cc0022);
      color: white;
      box-shadow:
        0 6px 0 #880011,
        0 8px 20px rgba(255,34,68,0.3);
      transition: all 0.12s;
      -webkit-user-select: none;
    }

    .spin-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer {
      100% { left: 100%; }
    }

    .spin-btn:active:not(:disabled) {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #880011, 0 4px 10px rgba(255,34,68,0.2);
    }

    .spin-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spin-btn.spinning {
      background: linear-gradient(135deg, #444, #222);
      box-shadow: 0 6px 0 #111, 0 8px 20px rgba(0,0,0,0.3);
    }

    /* 配当表 */
    .paytable {
      background: rgba(255,215,0,0.04);
      border: 1px solid rgba(255,215,0,0.1);
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 12px;
    }

    .paytable-title {
      font-size: 10px;
      color: rgba(255,215,0,0.5);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 8px;
    }

    .paytable-rows {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px 12px;
    }

    .pt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
    }

    .pt-symbols { font-size: 16px; line-height: 1.4; }
    .pt-mult { color: var(--gold); font-weight: 700; font-size: 11px; }

    /* コンフェッティ */
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 100;
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      top: -10px;
      border-radius: 1px;
      animation: confettiFall var(--dur) ease-in forwards;
    }

    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="confetti-wrap" id="confetti"></div>

<div class="machine">
  <div class="title">
    <h1>🎰 LUCKY SPIN</h1>
  </div>

  <div class="credits-bar">
    <div class="credit-box">
      <div class="credit-label">CREDITS</div>
      <div class="credit-value" id="credits">1000</div>
    </div>
    <div class="credit-box">
      <div class="credit-label">BET</div>
      <div class="bet-controls">
        <button class="bet-btn" id="betDown">−</button>
        <div class="credit-value" id="betDisplay">10</div>
        <button class="bet-btn" id="betUp">＋</button>
      </div>
    </div>
    <div class="credit-box">
      <div class="credit-label">WIN</div>
      <div class="credit-value" id="lastWin">0</div>
    </div>
  </div>

  <div class="machine-body">
    <div class="payline"></div>
    <div class="reels">
      <div class="reel-wrap" id="reel0"><div class="reel" id="reelInner0"></div></div>
      <div class="reel-wrap" id="reel1"><div class="reel" id="reelInner1"></div></div>
      <div class="reel-wrap" id="reel2"><div class="reel" id="reelInner2"></div></div>
    </div>
    <div class="result-msg">
      <div class="msg-text" id="msgText"></div>
    </div>
  </div>

  <div class="spin-area">
    <button class="spin-btn" id="spinBtn">SPIN</button>
    <div class="paytable">
      <div class="paytable-title">PAYTABLE</div>
      <div class="paytable-rows">
        <div class="pt-row"><span class="pt-symbols">💎💎💎</span><span class="pt-mult">×100</span></div>
        <div class="pt-row"><span class="pt-symbols">7️⃣7️⃣7️⃣</span><span class="pt-mult">×50</span></div>
        <div class="pt-row"><span class="pt-symbols">🍒🍒🍒</span><span class="pt-mult">×20</span></div>
        <div class="pt-row"><span class="pt-symbols">⭐⭐⭐</span><span class="pt-mult">×15</span></div>
        <div class="pt-row"><span class="pt-symbols">🍋🍋🍋</span><span class="pt-mult">×10</span></div>
        <div class="pt-row"><span class="pt-symbols">🍇🍇🍇</span><span class="pt-mult">×8</span></div>
        <div class="pt-row"><span class="pt-symbols">🍒🍒 ×2</span><span class="pt-mult">×3</span></div>
        <div class="pt-row"><span class="pt-symbols">🍒 ×1</span><span class="pt-mult">×1.5</span></div>
      </div>
    </div>
  </div>
</div>

<script>
  const SYMBOLS = ['💎','7️⃣','🍒','⭐','🍋','🍇','🍊','🔔'];
  const WEIGHTS =  [1,    3,   12,   8,   12,  10,  10,   8];
  
  const PAYTABLE = {
    '💎💎💎': 100,
    '7️⃣7️⃣7️⃣': 50,
    '🍒🍒🍒': 20,
    '⭐⭐⭐': 15,
    '🍋🍋🍋': 10,
    '🍇🍇🍇': 8,
    '🍊🍊🍊': 6,
    '🔔🔔🔔': 5,
  };

  let credits = parseInt(localStorage.getItem('slotCredits') || '1000');
  let bet = parseInt(localStorage.getItem('slotBet') || '10');
  const BET_OPTIONS = [5, 10, 25, 50, 100];
  let betIndex = BET_OPTIONS.indexOf(bet);
  if (betIndex < 0) betIndex = 1;
  bet = BET_OPTIONS[betIndex];
  let spinning = false;

  // 星を生成
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--d', (2 + Math.random() * 4) + 's');
    s.style.setProperty('--delay', (Math.random() * 3) + 's');
    starsEl.appendChild(s);
  }

  // リール初期化
  function buildReel(id) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    // 表示用に3つシンボル並べる（上・中・下）
    for (let i = 0; i < 3; i++) {
      const sym = document.createElement('div');
      sym.className = 'symbol';
      sym.textContent = pickSymbol();
      el.appendChild(sym);
    }
    // 中央を表示
    el.style.transform = 'translateY(-110px)';
  }

  function pickSymbol() {
    const total = WEIGHTS.reduce((a, b) => a + b, 0);
    let r = Math.random() * total;
    for (let i = 0; i < SYMBOLS.length; i++) {
      r -= WEIGHTS[i];
      if (r <= 0) return SYMBOLS[i];
    }
    return SYMBOLS[SYMBOLS.length - 1];
  }

  ['reelInner0','reelInner1','reelInner2'].forEach(id => buildReel(id));

  function updateUI() {
    document.getElementById('credits').textContent = credits;
    document.getElementById('betDisplay').textContent = BET_OPTIONS[betIndex];
    localStorage.setItem('slotCredits', credits);
    localStorage.setItem('slotBet', BET_OPTIONS[betIndex]);
  }
  updateUI();

  // ベット操作
  document.getElementById('betDown').addEventListener('click', () => {
    if (spinning) return;
    betIndex = Math.max(0, betIndex - 1);
    updateUI();
  });
  document.getElementById('betUp').addEventListener('click', () => {
    if (spinning) return;
    betIndex = Math.min(BET_OPTIONS.length - 1, betIndex + 1);
    updateUI();
  });

  // メッセージ
  function showMsg(text, type) {
    const el = document.getElementById('msgText');
    el.className = 'msg-text';
    el.textContent = text;
    el.offsetHeight; // reflow
    el.classList.add('show', type);
  }

  function hideMsg() {
    document.getElementById('msgText').classList.remove('show');
  }

  // リールアニメーション
  function spinReel(reelId, targetSymbol, duration) {
    return new Promise(resolve => {
      const el = document.getElementById(reelId);
      const ITEM_H = 110;
      const totalItems = 20 + Math.floor(Math.random() * 10);
      
      // スピン用シンボル列を生成
      el.innerHTML = '';
      const symbols = [];
      for (let i = 0; i < totalItems; i++) {
        symbols.push(pickSymbol());
      }
      symbols.push(targetSymbol); // 最後は確定シンボル
      
      symbols.forEach(s => {
        const div = document.createElement('div');
        div.className = 'symbol';
        div.textContent = s;
        el.appendChild(div);
      });

      // 中央に来る位置: totalItems番目が中央
      const targetY = -((symbols.length - 2) * ITEM_H);
      
      el.style.transition = 'none';
      el.style.transform = 'translateY(0)';
      el.offsetHeight;

      el.style.transition = `transform ${duration}ms cubic-bezier(0.15,0,0.1,1)`;
      el.style.transform = `translateY(${targetY}px)`;

      setTimeout(resolve, duration);
    });
  }

  // コンフェッティ
  function launchConfetti(count = 60) {
    const wrap = document.getElementById('confetti');
    wrap.innerHTML = '';
    const colors = ['#ffd700','#ff2244','#44aaff','#88ff44','#ff8800','#fff'];
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.setProperty('--dur', (1.5 + Math.random() * 1.5) + 's');
      p.style.animationDelay = (Math.random() * 0.5) + 's';
      p.style.transform = `rotate(${Math.random() * 360}deg)`;
      p.style.width = (6 + Math.random() * 8) + 'px';
      p.style.height = (6 + Math.random() * 8) + 'px';
      wrap.appendChild(p);
    }
    setTimeout(() => wrap.innerHTML = '', 3000);
  }

  // スピン
  async function doSpin() {
    if (spinning) return;
    const currentBet = BET_OPTIONS[betIndex];
    if (credits < currentBet) {
      showMsg('コインが足りない！', 'lose');
      return;
    }

    spinning = true;
    credits -= currentBet;
    document.getElementById('lastWin').textContent = 0;
    updateUI();
    hideMsg();

    // リール結果を決定
    const results = [pickSymbol(), pickSymbol(), pickSymbol()];

    const btn = document.getElementById('spinBtn');
    btn.disabled = true;
    btn.classList.add('spinning');
    btn.textContent = '...';

    // ウィナー表示リセット
    [0,1,2].forEach(i => document.getElementById(`reel${i}`).classList.remove('winner'));

    // 順番にリール停止
    const durations = [800, 1100, 1400];
    await Promise.all([
      spinReel('reelInner0', results[0], durations[0]),
      spinReel('reelInner1', results[1], durations[1]),
      spinReel('reelInner2', results[2], durations[2]),
    ]);

    // 当選判定
    const key = results.join('');
    let multiplier = 0;
    let msgText = '';
    let msgType = 'lose';

    if (PAYTABLE[key]) {
      multiplier = PAYTABLE[key];
    } else if (results[0] === '🍒' && results[1] === '🍒') {
      multiplier = 3;
    } else if (results[0] === '🍒') {
      multiplier = 1.5;
    }

    if (multiplier > 0) {
      const win = Math.floor(currentBet * multiplier);
      credits += win;
      document.getElementById('lastWin').textContent = win;
      document.getElementById('lastWin').classList.add('win-flash');
      setTimeout(() => document.getElementById('lastWin').classList.remove('win-flash'), 1000);
      updateUI();

      if (multiplier >= 50) {
        msgText = '🎊 JACKPOT!! 🎊';
        msgType = 'jackpot';
        launchConfetti(100);
        [0,1,2].forEach(i => document.getElementById(`reel${i}`).classList.add('winner'));
      } else if (multiplier >= 20) {
        msgText = `🔥 BIG WIN! ×${multiplier}`;
        msgType = 'big';
        launchConfetti(50);
        [0,1,2].forEach(i => document.getElementById(`reel${i}`).classList.add('winner'));
      } else if (multiplier >= 8) {
        msgText = `✨ WIN! ×${multiplier}`;
        msgType = 'win';
        [0,1,2].forEach(i => document.getElementById(`reel${i}`).classList.add('winner'));
      } else {
        msgText = `＋${Math.floor(currentBet * multiplier)}コイン`;
        msgType = 'small';
      }

      setTimeout(() => {
        [0,1,2].forEach(i => document.getElementById(`reel${i}`).classList.remove('winner'));
      }, 3000);
    } else {
      msgText = 'MISS...';
      msgType = 'lose';
    }

    showMsg(msgText, msgType);

    // クレジットなしリセット
    if (credits <= 0) {
      setTimeout(() => {
        credits = 1000;
        updateUI();
        showMsg('🎁 RELOAD! 1000コイン', 'small');
      }, 1500);
    }

    btn.disabled = false;
    btn.classList.remove('spinning');
    btn.textContent = 'SPIN';
    spinning = false;
  }

  document.getElementById('spinBtn').addEventListener('click', doSpin);
  
  // スペースキー対応
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); doSpin(); }
  });

  // Service Worker登録（PWA・オフライン対応）
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
